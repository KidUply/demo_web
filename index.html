<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMARMENSHOP — Premium Men's Fashion</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════ */
    :root {
      --black:   #080808;
      --white:   #ffffff;
      --grey-1:  #f7f7f7;
      --grey-2:  #eeeeee;
      --grey-3:  #d0d0d0;
      --grey-4:  #a0a0a0;
      --grey-5:  #606060;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1);
    }

    /* ═══════════════════════════════════════════════════
       BASE
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      cursor: none;
      overflow-x: hidden;
    }

    .font-display { font-family: 'Syne', sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 2px; height: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--black); }

    /* ═══════════════════════════════════════════════════
       CUSTOM CURSOR
    ═══════════════════════════════════════════════════ */
    #cursor-dot {
      position: fixed; top: 0; left: 0; z-index: 99999;
      width: 8px; height: 8px; background: var(--black);
      border-radius: 50%; pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width 0.25s var(--ease-out-expo),
                  height 0.25s var(--ease-out-expo),
                  background 0.2s ease,
                  opacity 0.3s ease;
      will-change: transform;
    }
    #cursor-ring {
      position: fixed; top: 0; left: 0; z-index: 99998;
      width: 36px; height: 36px;
      border: 1.5px solid rgba(8,8,8,0.3);
      border-radius: 50%; pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width 0.4s var(--ease-out-expo),
                  height 0.4s var(--ease-out-expo),
                  border-color 0.25s ease,
                  opacity 0.3s ease;
      will-change: transform;
    }
    body.cursor-hover #cursor-dot  { width: 12px; height: 12px; }
    body.cursor-hover #cursor-ring { width: 54px; height: 54px; border-color: rgba(8,8,8,0.15); }
    body.cursor-click #cursor-dot  { width: 6px; height: 6px; background: var(--grey-5); }

    /* ═══════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════ */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      transition: background 0.5s var(--ease-out-expo),
                  border-color 0.5s var(--ease-out-expo),
                  backdrop-filter 0.5s ease;
      border-bottom: 1px solid transparent;
    }
    .site-header.scrolled {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-color: var(--grey-2);
    }
    .site-header.on-dark { color: var(--white); }
    .site-header.on-dark .header-logo-dark { display: none; }
    .site-header.on-dark .header-logo-light { display: block; }
    .site-header:not(.on-dark) .header-logo-dark { display: block; }
    .site-header:not(.on-dark) .header-logo-light { display: none; }
    .site-header.scrolled.on-dark { color: var(--black); }
    .site-header.scrolled.on-dark .header-logo-dark { display: block; }
    .site-header.scrolled.on-dark .header-logo-light { display: none; }

    .header-inner {
      max-width: 1360px; margin: 0 auto;
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .header-nav-item {
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
      padding: 8px 0; position: relative; opacity: 0.5;
      transition: opacity 0.2s ease;
      background: none; border: none; color: inherit;
    }
    .header-nav-item::after {
      content: ''; position: absolute; bottom: 4px; left: 0; right: 100%;
      height: 1px; background: currentColor;
      transition: right 0.3s var(--ease-out-expo);
    }
    .header-nav-item:hover { opacity: 1; }
    .header-nav-item:hover::after { right: 0; }

    .cart-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 22px; background: var(--black); color: var(--white);
      border: none; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      transition: background 0.2s ease, transform 0.15s ease;
      position: relative;
    }
    .site-header.on-dark:not(.scrolled) .cart-btn {
      background: var(--white); color: var(--black);
    }
    .cart-btn:hover { transform: translateY(-1px); }
    .cart-btn:active { transform: translateY(0); }

    .cart-badge {
      position: absolute; top: -8px; right: -8px;
      width: 20px; height: 20px;
      background: var(--black); color: var(--white);
      border: 2.5px solid var(--white);
      border-radius: 50%;
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      animation: badge-pop 0.35s var(--ease-out-expo);
    }
    .site-header.on-dark:not(.scrolled) .cart-badge {
      background: var(--black); color: var(--white); border-color: transparent;
    }
    @keyframes badge-pop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* ═══════════════════════════════════════════════════
       MARQUEE
    ═══════════════════════════════════════════════════ */
    .marquee-wrap {
      overflow: hidden; background: var(--black); color: var(--white);
      padding: 11px 0; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .marquee-track {
      display: flex; width: max-content;
      animation: marquee-scroll 28s linear infinite;
    }
    .marquee-track:hover { animation-play-state: paused; }
    .marquee-item {
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.55);
      padding: 0 28px; white-space: nowrap;
    }
    .marquee-sep {
      color: rgba(255,255,255,0.2);
      font-size: 14px; line-height: 1; align-self: center;
    }
    @keyframes marquee-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ═══════════════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════════════ */
    .hero-section {
      background: var(--black); color: var(--white);
      min-height: 100svh;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 0 0 0;
      position: relative; overflow: hidden;
    }
    .hero-bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }
    .hero-bg-circle {
      position: absolute; bottom: -20%; right: -10%;
      width: 700px; height: 700px;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-bg-circle2 {
      position: absolute; bottom: -30%; right: -20%;
      width: 1000px; height: 1000px;
      border: 1px solid rgba(255,255,255,0.025);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-content {
      position: relative; z-index: 2;
      max-width: 1360px; margin: 0 auto; width: 100%;
      padding: 120px 32px 64px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .hero-label {
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); margin-bottom: 24px;
      animation: fade-up 0.9s 0.2s var(--ease-out-expo) both;
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(52px, 9vw, 130px);
      font-weight: 800; line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 40px;
    }
    .hero-title-line {
      display: block; overflow: hidden;
    }
    .hero-title-line span {
      display: block;
      animation: slide-up 0.9s var(--ease-out-expo) both;
    }
    .hero-title-line:nth-child(1) span { animation-delay: 0.1s; }
    .hero-title-line:nth-child(2) span { animation-delay: 0.2s; }
    .hero-title-line:nth-child(3) span { animation-delay: 0.3s; }

    .hero-bottom {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 32px; flex-wrap: wrap;
      animation: fade-up 0.9s 0.5s var(--ease-out-expo) both;
    }
    .hero-desc {
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300;
      color: rgba(255,255,255,0.45); line-height: 1.75;
      max-width: 320px;
    }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 14px;
      padding: 16px 32px;
      background: var(--white); color: var(--black);
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      border: none; cursor: pointer;
      transition: gap 0.3s var(--ease-out-expo), transform 0.2s ease;
      flex-shrink: 0;
    }
    .hero-cta:hover { gap: 22px; transform: translateY(-2px); }
    .hero-cta-arrow { font-size: 16px; line-height: 1; }

    .hero-scroll-hint {
      position: absolute; bottom: 36px; right: 36px; z-index: 3;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      animation: fade-up 0.9s 0.8s var(--ease-out-expo) both;
    }
    .hero-scroll-line {
      width: 1px; height: 48px; background: rgba(255,255,255,0.2);
      position: relative; overflow: hidden;
    }
    .hero-scroll-line::after {
      content: ''; position: absolute; top: -100%; left: 0; right: 0;
      height: 100%; background: rgba(255,255,255,0.6);
      animation: scroll-line 2s ease-in-out infinite;
    }
    .hero-scroll-text {
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      writing-mode: vertical-rl; text-orientation: mixed;
    }
    @keyframes scroll-line {
      0%   { top: -100%; }
      50%  { top: 100%; }
      100% { top: 100%; }
    }

    /* ═══════════════════════════════════════════════════
       SECTION LAYOUT
    ═══════════════════════════════════════════════════ */
    .shop-section {
      max-width: 1360px; margin: 0 auto;
      padding: 72px 32px 96px;
    }
    .section-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 52px; flex-wrap: wrap; gap: 24px;
    }
    .section-title {
      font-family: 'Syne', sans-serif; font-size: clamp(28px, 4vw, 48px);
      font-weight: 800; line-height: 1.05; letter-spacing: -0.01em;
    }
    .section-count {
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      color: var(--grey-4); letter-spacing: 0.04em;
    }

    /* ═══════════════════════════════════════════════════
       FILTER BAR
    ═══════════════════════════════════════════════════ */
    .filter-bar {
      display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
      margin-bottom: 16px; padding-bottom: 24px;
      border-bottom: 1px solid var(--grey-2);
    }
    .filter-cats { display: flex; gap: 2px; }
    .filter-cat-btn {
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 8px 18px;
      background: transparent; color: var(--grey-4);
      border: none; cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }
    .filter-cat-btn::after {
      content: ''; position: absolute; bottom: 0; left: 18px; right: 18px;
      height: 1.5px; background: var(--black);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s var(--ease-out-expo);
    }
    .filter-cat-btn:hover { color: var(--black); }
    .filter-cat-btn.active { color: var(--black); }
    .filter-cat-btn.active::after { transform: scaleX(1); }

    .filter-divider {
      width: 1px; height: 20px; background: var(--grey-2); flex-shrink: 0;
    }

    .filter-price-wrap {
      display: flex; align-items: center; gap: 14px;
    }
    .filter-label {
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-4);
      white-space: nowrap;
    }
    .filter-price-val { color: var(--black); }

    .filter-sizes { display: flex; gap: 4px; align-items: center; }
    .filter-size-btn {
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 10px;
      border: 1px solid var(--grey-2); background: var(--white); color: var(--grey-4);
      cursor: pointer; transition: all 0.15s ease;
    }
    .filter-size-btn:hover { border-color: var(--black); color: var(--black); }
    .filter-size-btn.active { border-color: var(--black); background: var(--black); color: var(--white); }

    input[type=range] {
      -webkit-appearance: none; width: 100px; height: 1.5px;
      background: var(--grey-2); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--black); cursor: pointer; border-radius: 50%;
      border: 2px solid var(--white); box-shadow: 0 0 0 1px var(--black);
    }

    /* ═══════════════════════════════════════════════════
       PRODUCT GRID
    ═══════════════════════════════════════════════════ */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
    }

    /* ═══════════════════════════════════════════════════
       PRODUCT CARD
    ═══════════════════════════════════════════════════ */
    .product-card {
      cursor: pointer; position: relative;
      background: var(--grey-1);
      overflow: hidden;
      animation: fade-up 0.6s var(--ease-out-expo) both;
    }
    .product-card:nth-child(1)  { animation-delay: 0ms; }
    .product-card:nth-child(2)  { animation-delay: 50ms; }
    .product-card:nth-child(3)  { animation-delay: 100ms; }
    .product-card:nth-child(4)  { animation-delay: 150ms; }
    .product-card:nth-child(5)  { animation-delay: 200ms; }
    .product-card:nth-child(6)  { animation-delay: 250ms; }
    .product-card:nth-child(7)  { animation-delay: 300ms; }
    .product-card:nth-child(8)  { animation-delay: 350ms; }

    .card-img-wrap {
      aspect-ratio: 3/4; overflow: hidden; position: relative;
    }
    .card-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.7s var(--ease-out-expo);
      will-change: transform;
    }
    .product-card:hover .card-img { transform: scale(1.06); }

    .card-sold-out {
      position: absolute; inset: 0; z-index: 2;
      background: rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
    }
    .card-sold-out-label {
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      background: var(--white); color: var(--grey-5);
      padding: 5px 14px; border: 1px solid var(--grey-3);
    }

    /* Card quick-view overlay */
    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
      background: var(--white);
      padding: 12px 16px;
      transform: translateY(100%);
      transition: transform 0.4s var(--ease-out-expo);
    }
    .product-card:hover .card-overlay { transform: translateY(0); }
    .card-overlay-sizes {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .card-overlay-size {
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 7px; border: 1px solid var(--grey-2);
      color: var(--grey-5);
    }
    .card-overlay-label {
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--grey-4); margin-bottom: 7px;
    }

    .card-info {
      padding: 14px 16px 18px;
      background: var(--white);
      border-top: 1px solid var(--grey-2);
    }
    .card-category {
      font-family: 'DM Sans', sans-serif; font-size: 9px;
      color: var(--grey-4); letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .card-name {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      line-height: 1.3; margin-bottom: 8px; color: var(--black);
      transition: letter-spacing 0.3s ease;
    }
    .product-card:hover .card-name { letter-spacing: 0.01em; }
    .card-price {
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
    }

    .card-new-badge {
      position: absolute; top: 14px; left: 14px; z-index: 4;
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      background: var(--black); color: var(--white);
      padding: 4px 10px;
    }

    /* ═══════════════════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════════════════ */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 80px 24px;
      border: 1.5px dashed var(--grey-2);
    }

    /* ═══════════════════════════════════════════════════
       PRODUCT DETAIL
    ═══════════════════════════════════════════════════ */
    .detail-wrap {
      max-width: 1360px; margin: 0 auto;
      padding: 96px 32px 80px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      background: none; border: none; cursor: pointer;
      color: var(--grey-4); margin-bottom: 48px; padding: 0;
      transition: color 0.2s ease, gap 0.3s var(--ease-out-expo);
    }
    .back-btn:hover { color: var(--black); gap: 16px; }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    }
    .detail-img-main {
      aspect-ratio: 3/4; background: var(--grey-1); overflow: hidden;
      margin-bottom: 10px;
    }
    .detail-img-main img {
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity 0.3s ease;
    }
    .detail-thumbs { display: flex; gap: 8px; }
    .detail-thumb {
      width: 68px; aspect-ratio: 1; background: var(--grey-1);
      overflow: hidden; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s ease, opacity 0.2s ease;
      opacity: 0.4;
    }
    .detail-thumb:hover { opacity: 0.75; }
    .detail-thumb.active { border-color: var(--black); opacity: 1; }
    .detail-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .detail-info { padding-top: 4px; }
    .detail-cat {
      font-family: 'DM Sans', sans-serif; font-size: 10px;
      color: var(--grey-4); letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .detail-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(22px, 3.5vw, 40px);
      font-weight: 800; line-height: 1.1; letter-spacing: -0.01em;
      margin-bottom: 20px;
    }
    .detail-price {
      font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
      margin-bottom: 32px;
    }
    .detail-rule {
      width: 32px; height: 1px; background: var(--grey-2); margin-bottom: 28px;
    }
    .detail-desc {
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300;
      line-height: 1.8; color: var(--grey-5); margin-bottom: 40px;
    }

    .size-section { margin-bottom: 32px; }
    .size-header {
      display: flex; justify-content: space-between; margin-bottom: 14px;
    }
    .size-label {
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .size-stock-info {
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--grey-4);
    }
    .size-grid { display: flex; gap: 6px; flex-wrap: wrap; }

    .size-btn {
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 11px 16px; min-width: 52px;
      border: 1.5px solid var(--grey-2); background: var(--white); color: var(--black);
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
    }
    .size-btn:hover:not(:disabled) { border-color: var(--black); }
    .size-btn.selected { background: var(--black); color: var(--white); border-color: var(--black); }
    .size-btn:disabled {
      border-color: var(--grey-2); color: var(--grey-3); cursor: not-allowed;
      background: repeating-linear-gradient(45deg, #fafafa, #fafafa 4px, #f4f4f4 4px, #f4f4f4 8px);
    }

    .stock-warning {
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #dc2626; margin-bottom: 20px;
    }

    .add-to-cart-btn {
      width: 100%; padding: 18px;
      background: var(--black); color: var(--white);
      border: none; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s ease, transform 0.15s ease;
      position: relative; overflow: hidden;
    }
    .add-to-cart-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; bottom: 0; width: 100%;
      background: rgba(255,255,255,0.07);
      transition: left 0.4s var(--ease-out-expo);
    }
    .add-to-cart-btn:hover:not(:disabled)::before { left: 100%; }
    .add-to-cart-btn:hover:not(:disabled) { transform: translateY(-1px); }
    .add-to-cart-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .add-to-cart-btn.added { background: #166534; }

    .detail-perks {
      display: flex; gap: 20px; flex-wrap: wrap; margin-top: 28px;
    }
    .detail-perk {
      display: flex; align-items: center; gap: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--grey-4);
    }
    .perk-check { color: var(--black); font-size: 13px; }

    /* ═══════════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 32px; left: 50%; z-index: 9999;
      transform: translateX(-50%) translateY(80px);
      background: var(--black); color: var(--white);
      padding: 14px 28px;
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      opacity: 0;
      transition: transform 0.4s var(--ease-out-expo), opacity 0.3s ease;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ═══════════════════════════════════════════════════
       CART PAGE
    ═══════════════════════════════════════════════════ */
    .cart-wrap {
      max-width: 1100px; margin: 0 auto;
      padding: 96px 32px 80px;
    }
    .cart-title {
      font-family: 'Syne', sans-serif; font-size: clamp(28px, 4vw, 48px);
      font-weight: 800; letter-spacing: -0.01em; margin-bottom: 48px;
    }
    .cart-grid {
      display: grid; grid-template-columns: 1fr 360px; gap: 60px;
    }
    .cart-item {
      display: flex; gap: 22px;
      padding: 24px 0; border-bottom: 1px solid var(--grey-2);
    }
    .cart-item-img {
      width: 88px; aspect-ratio: 3/4; background: var(--grey-1);
      flex-shrink: 0; overflow: hidden;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-name {
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    }
    .cart-item-meta {
      font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--grey-4);
      margin-top: 4px; margin-bottom: 16px;
    }
    .cart-item-price {
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
    }

    .qty-wrap { display: flex; }
    .qty-btn {
      width: 36px; height: 36px;
      border: 1.5px solid var(--grey-2); background: var(--white);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease; color: var(--black);
    }
    .qty-btn:hover { border-color: var(--black); background: var(--black); color: var(--white); }
    .qty-display {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
      padding: 0 20px;
      border-top: 1.5px solid var(--grey-2); border-bottom: 1.5px solid var(--grey-2);
      height: 36px; display: flex; align-items: center;
      min-width: 52px; justify-content: center;
    }

    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--grey-3); font-family: 'DM Sans', sans-serif; font-size: 11px;
      display: flex; align-items: center; gap: 4px; padding: 0;
      transition: color 0.2s ease;
    }
    .remove-btn:hover { color: #dc2626; }

    .order-summary {
      position: sticky; top: 84px;
      border: 1.5px solid var(--grey-2); padding: 32px;
    }
    .order-summary-title {
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 24px;
    }
    .summary-line {
      display: flex; justify-content: space-between;
      margin-bottom: 12px;
    }
    .summary-line-label { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--grey-5); }
    .summary-line-val   { font-family: 'DM Sans', sans-serif; font-size: 13px; }
    .summary-total {
      display: flex; justify-content: space-between;
      padding-top: 20px; margin-top: 8px;
      border-top: 1.5px solid var(--black);
    }
    .summary-total-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; }
    .summary-total-val   { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }

    /* ═══════════════════════════════════════════════════
       CHECKOUT FORM
    ═══════════════════════════════════════════════════ */
    .checkout-field { margin-bottom: 22px; }
    .checkout-label {
      display: block; font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-4);
      margin-bottom: 8px;
    }
    .checkout-input {
      width: 100%; border: none; border-bottom: 1.5px solid var(--grey-2);
      padding: 10px 0; font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; background: transparent; color: var(--black);
      transition: border-color 0.2s ease;
    }
    .checkout-input:focus { border-color: var(--black); }
    .checkout-input::placeholder { color: var(--grey-3); }

    .cod-badge {
      background: var(--grey-1); padding: 12px 16px; margin-bottom: 22px;
      font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--grey-5);
    }

    /* ═══════════════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════════════ */
    .btn {
      font-family: 'Syne', sans-serif; font-weight: 700;
      letter-spacing: 0.1em; font-size: 10px; text-transform: uppercase;
      cursor: pointer; border: none; display: inline-flex;
      align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s ease;
    }
    .btn-black { background: var(--black); color: var(--white); padding: 15px 32px; }
    .btn-black:hover:not(:disabled) { background: #2a2a2a; transform: translateY(-1px); }
    .btn-black:active { transform: translateY(0); }
    .btn-black:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-outline {
      background: transparent; color: var(--black);
      border: 1.5px solid var(--black); padding: 13px 28px;
    }
    .btn-outline:hover { background: var(--black); color: var(--white); }

    /* ═══════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════ */
    .footer {
      border-top: 1px solid var(--grey-2);
      padding: 40px 32px;
      max-width: 1360px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 20px;
    }
    .footer-copy {
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--grey-3);
    }
    .footer-tags { display: flex; gap: 28px; }
    .footer-tag {
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey-3);
    }

    /* ═══════════════════════════════════════════════════
       ORDER SUCCESS
    ═══════════════════════════════════════════════════ */
    .success-wrap {
      max-width: 480px; margin: 100px auto; padding: 0 24px; text-align: center;
    }
    .success-icon {
      width: 56px; height: 56px; background: var(--black); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; color: var(--white);
    }
    .success-title {
      font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
      margin-bottom: 12px;
    }
    .success-sub {
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: var(--grey-5); margin-bottom: 6px;
    }
    .success-detail {
      background: var(--grey-1); padding: 16px 20px;
      margin: 24px 0 32px; text-align: left;
    }
    .success-detail-label {
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-4);
      margin-bottom: 6px;
    }
    .success-detail-val { font-family: 'DM Sans', sans-serif; font-size: 14px; }

    /* ═══════════════════════════════════════════════════
       ADMIN — COMPLETELY SEPARATE VISUAL SYSTEM
    ═══════════════════════════════════════════════════ */

    /* Admin Login */
    .admin-login-wrap {
      min-height: 100vh; background: var(--black);
      display: flex; align-items: center; justify-content: center;
    }
    .admin-login-box {
      width: 100%; max-width: 380px; padding: 0 24px;
      animation: fade-up 0.6s var(--ease-out-expo) both;
    }
    .admin-login-logo {
      text-align: center; margin-bottom: 48px;
    }
    .admin-login-panel-label {
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); margin-top: 12px; display: block;
    }
    .admin-login-title {
      font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
      color: var(--white); margin-bottom: 6px; text-align: center;
    }
    .admin-login-sub {
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: rgba(255,255,255,0.3); margin-bottom: 36px; text-align: center;
    }
    .admin-input-wrap { position: relative; margin-bottom: 14px; }
    .admin-input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .admin-input:focus { border-color: rgba(255,255,255,0.4); }
    .admin-input::placeholder { color: rgba(255,255,255,0.2); }
    .admin-input.err { border-color: #dc2626; }
    .admin-err {
      font-family: 'DM Sans', sans-serif; font-size: 12px; color: #f87171;
      margin-top: 6px; margin-bottom: 6px;
    }
    .admin-login-btn {
      width: 100%; padding: 15px;
      background: var(--white); color: var(--black);
      border: none; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      transition: opacity 0.2s ease, transform 0.15s ease;
    }
    .admin-login-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .admin-hint {
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      color: rgba(255,255,255,0.12); text-align: center; margin-top: 20px;
    }

    /* Admin Panel */
    .admin-layout {
      display: flex; height: 100vh; overflow: hidden; background: var(--white);
    }
    .admin-sidebar {
      width: 220px; background: #0d0d0d;
      border-right: none; flex-shrink: 0;
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }
    .admin-sidebar-head {
      padding: 24px 20px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .admin-panel-tag {
      font-family: 'Syne', sans-serif; font-size: 7px; font-weight: 700;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.18); margin-top: 12px; display: block;
    }
    .admin-nav { padding: 10px 0; flex: 1; }
    .admin-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      transition: all 0.15s ease; border-left: 2px solid transparent;
      background: none; border-right: none; border-top: none; border-bottom: none;
      width: 100%; text-align: left;
    }
    .admin-nav-item:hover { color: rgba(255,255,255,0.75); }
    .admin-nav-item.active { color: var(--white); border-left-color: var(--white); background: rgba(255,255,255,0.05); }

    .admin-sidebar-foot {
      padding: 18px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .admin-exit-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      display: flex; align-items: center; gap: 8px; padding: 0;
      transition: color 0.2s ease;
    }
    .admin-exit-btn:hover { color: rgba(255,255,255,0.6); }

    .admin-content {
      flex: 1; overflow-y: auto; padding: 40px 44px;
      background: #f9f9f9;
    }
    .admin-page-title {
      font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
      margin-bottom: 4px;
    }
    .admin-page-sub {
      font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--grey-4);
      margin-bottom: 0;
    }
    .admin-header-row {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
    }

    /* Admin Stats */
    .admin-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; margin-bottom: 36px;
    }
    .admin-stat-card {
      background: var(--white); padding: 20px 24px;
      border: 1px solid var(--grey-2);
    }
    .admin-stat-label {
      font-family: 'DM Sans', sans-serif; font-size: 10px;
      color: var(--grey-4); letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .admin-stat-val {
      font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800;
    }

    /* Admin Alert */
    .admin-alert {
      background: #fffbeb; border: 1px solid #fde68a;
      padding: 12px 18px; margin-bottom: 28px;
      display: flex; align-items: center; gap: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
    }

    /* Admin Table */
    .admin-table-wrap { background: var(--white); border: 1px solid var(--grey-2); overflow: hidden; overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--grey-4);
      padding: 14px 16px; text-align: left;
      border-bottom: 1px solid var(--grey-2); white-space: nowrap;
    }
    .admin-table td {
      padding: 14px 16px; border-bottom: 1px solid var(--grey-1);
      font-size: 13px; vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--grey-1); }

    .admin-badge {
      font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 9px;
      display: inline-block;
    }
    .admin-badge-active   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .admin-badge-inactive { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    .admin-action-btn {
      padding: 6px 9px; border: 1px solid var(--grey-2);
      background: var(--white); cursor: pointer;
      color: var(--grey-3); display: inline-flex; align-items: center;
      transition: all 0.15s ease;
    }
    .admin-action-btn:hover { border-color: var(--black); color: var(--black); }
    .admin-action-btn.danger:hover { border-color: #dc2626; color: #dc2626; }

    /* Admin Form */
    .admin-form { max-width: 880px; }
    .admin-form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 36px;
    }
    .admin-field { margin-bottom: 20px; }
    .admin-field-label {
      display: block; font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-4);
      margin-bottom: 8px;
    }
    .admin-field-input {
      width: 100%; border: 1.5px solid var(--grey-2); padding: 11px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--black);
      background: var(--white); outline: none; transition: border-color 0.15s;
    }
    .admin-field-input:focus { border-color: var(--black); }
    .admin-field-input::placeholder { color: var(--grey-3); }

    .admin-toggle-wrap { display: flex; gap: 8px; }
    .admin-toggle-btn {
      padding: 8px 20px; border: 1.5px solid var(--grey-2);
      background: var(--white); color: var(--grey-4);
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: all 0.15s ease;
    }
    .admin-toggle-btn.on  { border-color: var(--black); background: var(--black); color: var(--white); }
    .admin-toggle-btn.off { border-color: #dc2626; background: #fef2f2; color: #991b1b; }

    .admin-inventory-box { border: 1.5px solid var(--grey-2); background: var(--white); }
    .admin-inv-row {
      display: flex; align-items: center; padding: 10px 14px;
      gap: 12px; border-bottom: 1px solid var(--grey-1);
    }
    .admin-inv-row:last-child { border-bottom: none; }
    .admin-inv-size {
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
      flex: 1; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .admin-inv-input {
      width: 56px; text-align: center; border: 1.5px solid var(--grey-2);
      padding: 6px 4px; font-family: 'Syne', sans-serif; font-size: 13px;
      font-weight: 700; outline: none;
      transition: border-color 0.15s;
    }
    .admin-inv-input:focus { border-color: var(--black); }
    .admin-inv-unit {
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--grey-3); width: 24px;
    }
    .admin-rm-size {
      background: none; border: none; cursor: pointer; color: var(--grey-3);
      display: flex; padding: 0; transition: color 0.15s;
    }
    .admin-rm-size:hover { color: var(--black); }

    .admin-img-preview {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .admin-img-thumb { position: relative; width: 76px; height: 76px; }
    .admin-img-thumb img {
      width: 100%; height: 100%; object-fit: cover; border: 1.5px solid var(--grey-2);
    }
    .admin-img-rm {
      position: absolute; top: -7px; right: -7px;
      width: 18px; height: 18px; background: var(--black); color: var(--white);
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }
    .admin-img-url-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .admin-file-drop {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px; border: 1.5px dashed var(--grey-2);
      background: var(--grey-1); width: 100%; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; color: var(--grey-4); text-transform: uppercase;
      transition: all 0.15s ease; background-color: unset;
      border-color: var(--grey-2);
    }
    .admin-file-drop:hover { border-color: var(--black); color: var(--black); }

    .admin-form-actions { display: flex; gap: 12px; margin-top: 36px; }

    /* ═══════════════════════════════════════════════════
       ANIMATIONS
    ═══════════════════════════════════════════════════ */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-up {
      from { transform: translateY(105%); }
      to   { transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .animate-in { animation: fade-up 0.5s var(--ease-out-expo) both; }
    .animate-fade { animation: fade-in 0.4s ease both; }

    /* ═══════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════ */
    @media (max-width: 1100px) {
      .product-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .admin-stats  { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 860px) {
      .detail-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
      .cart-grid   { grid-template-columns: 1fr !important; gap: 40px !important; }
      .admin-form-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 720px) {
      .product-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 2px !important; }

  <script>
    // Cursor tracking (vanilla JS, runs immediately)
    (function() {
      const dot  = document.getElementById('cursor-dot');
      const ring = document.getElementById('cursor-ring');
      let mx = 0, my = 0, rx = 0, ry = 0;
      let raf;

      document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
      document.addEventListener('mousedown', () => document.body.classList.add('cursor-click'));
      document.addEventListener('mouseup',   () => document.body.classList.remove('cursor-click'));

      // Dot follows instantly, ring lags
      function loop() {
        dot.style.left  = mx + 'px';
        dot.style.top   = my + 'px';
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.left = rx + 'px';
        ring.style.top  = ry + 'px';
        raf = requestAnimationFrame(loop);
      }
      loop();

      document.addEventListener('mouseover', e => {
        if (e.target.closest('button,a,[data-hover],.product-card'))
          document.body.classList.add('cursor-hover');
      });
      document.addEventListener('mouseout', e => {
        if (e.target.closest('button,a,[data-hover],.product-card'))
          document.body.classList.remove('cursor-hover');
      });
    })();

  };

  /* ═══════════════════════════════════════════════════
     PRODUCT DETAIL
  ═══════════════════════════════════════════════════ */
  const ProductDetail = ({ product, onBack, onAddToCart }) => {
    const [selSize, setSelSize]   = useState(null);
    const [activeImg, setActiveImg] = useState(0);
    const [added, setAdded]       = useState(false);
    const [imgErr, setImgErr]     = useState({});

    const sizes      = Object.entries(product.sizes);
    const selStock   = selSize ? Number(product.sizes[selSize]) : 0;
    const totalStock = sizes.reduce((a,[,v]) => a+Number(v), 0);

    const handleAdd = () => {
      if (!selSize || selStock === 0) return;
      onAddToCart(product, selSize);
      setAdded(true);
      setTimeout(() => setAdded(false), 2200);
    };

    return (
      <div className="detail-wrap animate-in">
        <button className="back-btn" onClick={onBack}>
          <IBack s={14}/> Back to Shop
        </button>

        <div className="detail-grid">
          {/* Gallery */}
          <div>
            <div className="detail-img-main">
              {!imgErr[activeImg]
                ? <img src={product.images[activeImg]} alt={product.title}
                    onError={() => setImgErr(p => ({...p,[activeImg]:true}))} />
                : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:72, opacity:0.08 }}>◻</div>
              }
            </div>
            {product.images.length > 1 && (
              <div className="detail-thumbs">
                {product.images.map((img, i) => (
                  <div key={i} className={`detail-thumb ${activeImg===i ? 'active':''}`} onClick={() => setActiveImg(i)} data-hover>
                    <img src={img} alt="" />
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Info */}
          <div className="detail-info">
            <p className="detail-cat">{product.category}</p>
            <h1 className="detail-name">{product.title}</h1>
            <p className="detail-price">${product.price}</p>
            <div className="detail-rule"/>
            <p className="detail-desc">{product.description}</p>

            {/* Sizes */}
            <div className="size-section">
              <div className="size-header">
                <span className="size-label">Select Size</span>
                {selSize && selStock > 0 && <span className="size-stock-info">{selStock} in stock</span>}
              </div>
              <div className="size-grid">
                {sizes.map(([sz,qty]) => (
                  <button key={sz} className={`size-btn ${selSize===sz ? 'selected':''}`}
                    disabled={Number(qty)===0} onClick={() => setSelSize(sz)}>{sz}</button>
                ))}
              </div>
            </div>

            {totalStock === 0 && <p className="stock-warning">✕ Out of Stock</p>}
            {selSize && selStock === 0 && totalStock > 0 && <p className="stock-warning">✕ This size is out of stock</p>}

            <button className={`add-to-cart-btn ${added ? 'added':''}`}
              disabled={!selSize || selStock===0} onClick={handleAdd}>
              {added ? <><ICheck s={16}/> Added to Cart</> : selSize ? 'Add to Cart' : 'Select a Size First'}
            </button>

            <div className="detail-perks">
              {['Free Delivery','Cash on Delivery','Easy Returns'].map(t => (
                <span key={t} className="detail-perk">
                  <span className="perk-check">✓</span> {t}
                </span>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════
     CART PAGE
  ═══════════════════════════════════════════════════ */
  const CartPage = ({ cart, products, onBack, onRemove, onQty, onSuccess }) => {
    const [mode, setMode] = useState('cart');
    const [form, setForm] = useState({ name:'', phone:'', address:'', note:'' });
    const [success, setSuc] = useState(false);

    const items = cart.map(c => {
      const p = products.find(x => x.id === c.productId);
      return p ? { ...c, product:p } : null;
    }).filter(Boolean);

    const total = items.reduce((s,i) => s + i.product.price * i.qty, 0);

    if (success) return (
      <div className="success-wrap animate-in">
        <div className="success-icon"><ICheck s={24}/></div>
        <h2 className="success-title">Order Placed!</h2>
        <p className="success-sub">Thank you, <strong>{form.name}</strong>!</p>
        <p className="success-sub" style={{ color:'#aaa', fontSize:13 }}>We'll call <strong>{form.phone}</strong> to confirm.</p>
        <div className="success-detail">
          <p className="success-detail-label">Delivery Address</p>
          <p className="success-detail-val">{form.address}</p>
          {form.note && <p style={{ fontFamily:'DM Sans', fontSize:13, color:'#aaa', marginTop:6 }}>{form.note}</p>}
        </div>
        <button className="btn btn-black" style={{ padding:'15px 48px' }} onClick={onSuccess}>Continue Shopping</button>
      </div>
    );

    if (items.length === 0) return (
      <div style={{ maxWidth:480, margin:'100px auto', padding:'0 24px', textAlign:'center' }}>
        <div style={{ fontSize:48, opacity:0.12, marginBottom:20 }}>◻</div>
        <h2 style={{ fontFamily:'Syne', fontSize:28, fontWeight:800, marginBottom:8 }}>Cart is empty</h2>
        <p style={{ fontFamily:'DM Sans', color:'#aaa', marginBottom:28 }}>Browse our collection and add products</p>
        <button className="btn btn-black" style={{ padding:'14px 40px' }} onClick={onBack}>Shop Now</button>
      </div>
    );

    return (
      <div className="cart-wrap animate-in">
        <button className="back-btn" onClick={onBack}><IBack s={14}/> Continue Shopping</button>
        <h1 className="cart-title">Your Cart</h1>

        <div className="cart-grid">
          <div>
            {items.map(item => (
              <div key={`${item.productId}-${item.size}`} className="cart-item">
                <div className="cart-item-img">
                  <img src={item.product.images[0]} alt={item.product.title} />
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                    <h3 className="cart-item-name">{item.product.title}</h3>
                    <span className="cart-item-price">${item.product.price * item.qty}</span>
                  </div>
                  <p className="cart-item-meta">Size: <strong style={{ color:'#555' }}>{item.size}</strong> · ${item.product.price} each</p>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                    <div className="qty-wrap">
                      <button className="qty-btn" onClick={() => onQty(item.productId,item.size,item.qty-1)}><IMinus s={13}/></button>
                      <span className="qty-display">{item.qty}</span>
                      <button className="qty-btn" onClick={() => onQty(item.productId,item.size,item.qty+1)}><IPlus s={13}/></button>
                    </div>
                    <button className="remove-btn" onClick={() => onRemove(item.productId,item.size)}>
                      <ITrash s={13}/> Remove
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div>
            <div className="order-summary">
              {mode === 'cart' ? (
                <>
                  <p className="order-summary-title">Order Summary</p>
                  {items.map(i => (
                    <div key={`${i.productId}-${i.size}`} className="summary-line">
                      <span className="summary-line-label">{i.product.title} ×{i.qty}</span>
                      <span className="summary-line-val">${i.product.price*i.qty}</span>
                    </div>
                  ))}
                  <div className="summary-total">
                    <span className="summary-total-label">Total</span>
                    <span className="summary-total-val">${total}</span>
                  </div>
                  <button className="btn btn-black" style={{ width:'100%', padding:'16px', marginTop:24 }} onClick={() => setMode('checkout')}>
                    Proceed to Checkout
                  </button>
                </>
              ) : (
                <>
                  <p className="order-summary-title">Delivery Details</p>
                  {[
                    { key:'name',    label:'Full Name *',   ph:'Your full name' },
                    { key:'phone',   label:'Phone *',       ph:'+998 xx xxx xx xx' },
                    { key:'address', label:'Address *',     ph:'Street, district, city' },
                    { key:'note',    label:'Note',          ph:'Optional instructions' },
                  ].map(f => (
                    <div key={f.key} className="checkout-field">
                      <label className="checkout-label">{f.label}</label>
                      <input className="checkout-input" placeholder={f.ph} value={form[f.key]}
                        onChange={e => setForm(p => ({...p,[f.key]:e.target.value}))} />
                    </div>
                  ))}
                  <div className="cod-badge">💵 Payment: <strong>Cash on Delivery</strong></div>
                  <div className="summary-total" style={{ marginBottom:20 }}>
                    <span className="summary-total-label">Total</span>
                    <span className="summary-total-val">${total}</span>
                  </div>
                  <button className="btn btn-black" style={{ width:'100%', padding:'16px', marginBottom:10 }}
                    disabled={!form.name || !form.phone || !form.address}
                    onClick={() => setSuc(true)}>Place Order</button>
                  <button onClick={() => setMode('cart')} style={{ width:'100%', background:'none', border:'none', cursor:'pointer', fontFamily:'DM Sans', fontSize:12, color:'#aaa', padding:'8px 0' }}>← Back to cart</button>
                </>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════
     ADMIN LOGIN — STANDALONE DARK SCREEN
  ═══════════════════════════════════════════════════ */
  const AdminLogin = ({ onLogin, onBack }) => {
    const [pw, setPw] = useState('');
    const [err, setErr] = useState(false);
    const submit = () => {
      if (pw === ADMIN_PW) { onLogin(); }
      else { setErr(true); setPw(''); setTimeout(() => setErr(false), 2200); }
    };
    return (
      <div className="admin-login-wrap">
        <div className="admin-login-box">
          <div className="admin-login-logo">
            <Logo dark={false} />
            <span className="admin-login-panel-label">Admin Panel</span>
          </div>
          <h2 className="admin-login-title">Restricted Access</h2>
          <p className="admin-login-sub">Enter your administrator password to continue</p>
          <div className="admin-input-wrap">
            <input type="password" className={`admin-input ${err ? 'err':''}`}
              placeholder="Password" value={pw}
              onChange={e => setPw(e.target.value)}
              onKeyDown={e => e.key==='Enter' && submit()} />
          </div>
          {err && <p className="admin-err">Incorrect password. Try again.</p>}
          <button className="admin-login-btn" onClick={submit}>Enter Admin Panel</button>
          <button onClick={onBack} style={{ display:'flex', alignItems:'center', gap:8, background:'none', border:'none', cursor:'pointer', fontFamily:'Syne', fontSize:9, fontWeight:700, letterSpacing:'0.14em', color:'rgba(255,255,255,0.2)', textTransform:'uppercase', marginTop:32, padding:0, transition:'color 0.2s' }}
            onMouseEnter={e => e.currentTarget.style.color='rgba(255,255,255,0.5)'}
            onMouseLeave={e => e.currentTarget.style.color='rgba(255,255,255,0.2)'}>
            <IBack s={12}/> Back to Store
          </button>
          <p className="admin-hint">Default: admin123</p>
        </div>
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════
     ADMIN PRODUCT FORM
  ═══════════════════════════════════════════════════ */
  const AdminProductForm = ({ product, onSave, onCancel }) => {
    const isEdit = !!product;
    const [f, setF] = useState({
      title:       product?.title       || '',
      price:       product?.price       || '',
      description: product?.description || '',
      category:    product?.category    || 'clothes',
      images:      product?.images      || [],
      sizes:       product?.sizes       || { ...DEFAULT_SIZES.clothes },
      active:      product?.active !== undefined ? product.active : true,
    });
    const [imgUrl, setImgUrl] = useState('');
    const fileRef = useRef();

    const chCat = cat => setF(p => ({...p, category:cat, sizes:{...DEFAULT_SIZES[cat]}}));
    const handleFile = e => {
      Array.from(e.target.files).forEach(file => {
        const r = new FileReader();
        r.onload = ev => setF(p => ({...p, images:[...p.images, ev.target.result]}));
        r.readAsDataURL(file);
      });
    };
    const addUrl = () => { if (imgUrl.trim()) { setF(p => ({...p, images:[...p.images, imgUrl.trim()]})); setImgUrl(''); } };
    const rmImg  = i  => setF(p => ({...p, images:p.images.filter((_,idx) => idx!==i)}));
    const chSize = (k,v) => setF(p => ({...p, sizes:{...p.sizes,[k]:Math.max(0,parseInt(v)||0)}}));
    const addSize = () => {
      const k = prompt('Enter size label (e.g. "XXL", "46", "One Size"):');
      if (k && k.trim() && !f.sizes[k.trim()]) setF(p => ({...p, sizes:{...p.sizes,[k.trim()]:0}}));
    };
    const rmSize = k => { const {[k]:_,...rest} = f.sizes; setF(p => ({...p, sizes:rest})); };
    const submit = () => {
      if (!f.title.trim() || !f.price) { alert('Title and price are required.'); return; }
      onSave({...f, price:Number(f.price), id:product?.id||`p${Date.now()}`, createdAt:product?.createdAt||Date.now()});
    };

    return (
      <div className="admin-form animate-in">
        <div className="admin-header-row">
          <div>
            <h2 className="admin-page-title">{isEdit ? 'Edit Product' : 'New Product'}</h2>
            <p className="admin-page-sub">{isEdit ? `Editing: ${product.title}` : 'Fill in product details below'}</p>
          </div>
          <button onClick={onCancel} style={{ display:'inline-flex', alignItems:'center', gap:6, background:'none', border:'none', cursor:'pointer', fontFamily:'Syne', fontSize:9, fontWeight:700, color:'#aaa', textTransform:'uppercase', letterSpacing:'0.12em', padding:0 }}>
            <IBack s={12}/> Back
          </button>
        </div>

        <div className="admin-form-grid">
          {/* LEFT */}
          <div>
            <div className="admin-field">
              <label className="admin-field-label">Product Title *</label>
              <input className="admin-field-input" value={f.title} onChange={e => setF(p => ({...p, title:e.target.value}))} placeholder="e.g. Oversized Black Hoodie" />
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20 }}>
              <div>
                <label className="admin-field-label">Price (USD) *</label>
                <input className="admin-field-input" type="number" min="0" step="0.01" value={f.price} onChange={e => setF(p => ({...p, price:e.target.value}))} placeholder="0" />
              </div>
              <div>
                <label className="admin-field-label">Category</label>
                <select className="admin-field-input" value={f.category} onChange={e => chCat(e.target.value)}>
                  <option value="clothes">Clothes</option>
                  <option value="shoes">Shoes</option>
                  <option value="caps">Caps</option>
                  <option value="accessories">Accessories</option>
                </select>
              </div>
            </div>
            <div className="admin-field">
              <label className="admin-field-label">Description</label>
              <textarea className="admin-field-input" value={f.description} onChange={e => setF(p => ({...p, description:e.target.value}))} placeholder="Product description..." rows={5} style={{ resize:'vertical' }} />
            </div>
            <div className="admin-field">
              <label className="admin-field-label">Status</label>
              <div className="admin-toggle-wrap">
                <button className={`admin-toggle-btn ${f.active ? 'on':''}`} onClick={() => setF(p => ({...p, active:true}))}>Active</button>
                <button className={`admin-toggle-btn ${!f.active ? 'off':''}`} onClick={() => setF(p => ({...p, active:false}))}>Inactive</button>
              </div>
            </div>
          </div>

          {/* RIGHT */}
          <div>
            <div className="admin-field">
              <label className="admin-field-label">Product Images</label>
              {f.images.length > 0 && (
                <div className="admin-img-preview">
                  {f.images.map((img,i) => (
                    <div key={i} className="admin-img-thumb">
                      <img src={img} alt="" />
                      <button className="admin-img-rm" onClick={() => rmImg(i)}>×</button>
                    </div>
                  ))}
                </div>
              )}
              <div className="admin-img-url-row">
                <input className="admin-field-input" placeholder="Paste image URL..." value={imgUrl}
                  onChange={e => setImgUrl(e.target.value)} onKeyDown={e => e.key==='Enter' && addUrl()}
                  style={{ flex:1 }} />
                <button className="btn btn-black" style={{ padding:'10px 16px', fontSize:10, letterSpacing:'0.08em' }} onClick={addUrl}>Add</button>
              </div>
              <input type="file" ref={fileRef} accept="image/*" multiple style={{ display:'none' }} onChange={handleFile} />
              <button className="admin-file-drop" onClick={() => fileRef.current.click()}>
                <IUpload s={15}/> Upload from device
              </button>
            </div>

            <div className="admin-field">
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                <label className="admin-field-label" style={{ margin:0 }}>Inventory (qty per size)</label>
                <button onClick={addSize} style={{ background:'none', border:'none', cursor:'pointer', fontFamily:'Syne', fontSize:9, fontWeight:700, color:'#aaa', textTransform:'uppercase', letterSpacing:'0.1em', display:'flex', alignItems:'center', gap:4, padding:0 }}>
                  <IPlus s={11}/> Add Size
                </button>
              </div>
              <div className="admin-inventory-box">
                {Object.entries(f.sizes).map(([sz,qty],i,arr) => (
                  <div key={sz} className="admin-inv-row">
                    <span className="admin-inv-size">{sz}</span>
                    <input type="number" min="0" value={qty} onChange={e => chSize(sz,e.target.value)} className="admin-inv-input" />
                    <span className="admin-inv-unit">pcs</span>
                    <button className="admin-rm-size" onClick={() => rmSize(sz)}><IClose s={12}/></button>
                  </div>
                ))}
                {Object.keys(f.sizes).length === 0 && (
                  <div style={{ padding:16, textAlign:'center' }}>
                    <p style={{ fontFamily:'DM Sans', fontSize:12, color:'#ccc' }}>No sizes yet. Click "Add Size".</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>

        <div className="admin-form-actions">
          <button className="btn btn-black" style={{ padding:'14px 44px' }} onClick={submit}>{isEdit ? 'Save Changes' : 'Add Product'}</button>
          <button className="btn btn-outline" style={{ padding:'12px 28px' }} onClick={onCancel}>Cancel</button>
        </div>
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════
     ADMIN PRODUCTS LIST
  ═══════════════════════════════════════════════════ */
  const AdminList = ({ products, onEdit, onDelete, onToggle, onAdd }) => {
    const total      = products.length;
    const active     = products.filter(p => p.active).length;
    const totalStock = products.reduce((s,p) => s + Object.values(p.sizes).reduce((a,b)=>a+Number(b),0), 0);
    const totalValue = products.reduce((s,p) => s + p.price * Object.values(p.sizes).reduce((a,b)=>a+Number(b),0), 0);
    const lowStock   = products.filter(p => { const st = Object.values(p.sizes).reduce((a,b)=>a+Number(b),0); return st>0&&st<5; }).length;

    const stats = [
      { l:'Total Products', v:total },
      { l:'Active',         v:active },
      { l:'Total Stock',    v:`${totalStock} pcs` },
      { l:'Inventory Value',v:`$${totalValue.toLocaleString()}` },
    ];

    return (
      <div className="animate-in">
        <div className="admin-header-row">
          <div>
            <h2 className="admin-page-title">Products</h2>
            <p className="admin-page-sub">{total} total · {active} active · {totalStock} pcs in stock</p>
          </div>
          <button className="btn btn-black" style={{ padding:'11px 20px', fontSize:10 }} onClick={onAdd}><IPlus s={14}/> Add Product</button>
        </div>

        <div className="admin-stats">
          {stats.map(s => (
            <div key={s.l} className="admin-stat-card">
              <p className="admin-stat-label">{s.l}</p>
              <p className="admin-stat-val">{s.v}</p>
            </div>
          ))}
        </div>

        {lowStock > 0 && (
          <div className="admin-alert">
            <span style={{ fontSize:16 }}>⚠️</span>
            <p><strong>{lowStock} product{lowStock>1?'s':''}</strong> running low on stock (less than 5 pieces)</p>
          </div>
        )}

        {total === 0 ? (
          <div style={{ textAlign:'center', padding:'80px 0', border:'1.5px dashed #e0e0e0', background:'#fff' }}>
            <p style={{ fontFamily:'Syne', fontSize:18, fontWeight:800, marginBottom:8 }}>No products yet</p>
            <p style={{ fontFamily:'DM Sans', fontSize:13, color:'#bbb', marginBottom:24 }}>Add your first product</p>
            <button className="btn btn-black" style={{ padding:'13px 32px' }} onClick={onAdd}>Add First Product</button>
          </div>
        ) : (
          <div className="admin-table-wrap">
            <table className="admin-table">
              <thead>
                <tr>
                  <th style={{ width:56 }}>IMG</th>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Status</th>
                  <th style={{ width:118 }}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {products.map(p => {
                  const stock = Object.values(p.sizes).reduce((a,b)=>a+Number(b),0);
                  return (
                    <tr key={p.id}>
                      <td>
                        <div style={{ width:44, height:52, background:'#f4f4f4', overflow:'hidden' }}>
                          {p.images[0]
                            ? <img src={p.images[0]} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                            : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, opacity:0.2 }}>◻</div>
                          }
                        </div>
                      </td>
                      <td>
                        <p style={{ fontFamily:'Syne', fontSize:13, fontWeight:700, marginBottom:2 }}>{p.title}</p>
                        <p style={{ fontFamily:'DM Sans', fontSize:11, color:'#bbb' }}>Sizes: {Object.keys(p.sizes).join(', ')}</p>
                      </td>
                      <td><span style={{ fontFamily:'DM Sans', fontSize:12, color:'#888', textTransform:'capitalize' }}>{p.category}</span></td>
                      <td><span style={{ fontFamily:'Syne', fontSize:14, fontWeight:800 }}>${p.price}</span></td>
                      <td>
                        <span style={{ fontFamily:'Syne', fontSize:13, fontWeight:800, color: stock===0?'#dc2626':stock<5?'#d97706':'#166534' }}>{stock}</span>
                        <span style={{ fontFamily:'DM Sans', fontSize:11, color:'#ccc' }}> pcs</span>
                      </td>
                      <td><span className={`admin-badge ${p.active?'admin-badge-active':'admin-badge-inactive'}`}>{p.active?'Active':'Inactive'}</span></td>
                      <td>
                        <div style={{ display:'flex', gap:5 }}>
                          {[
                            { icon:<IEye s={14} off={!p.active}/>, title:p.active?'Deactivate':'Activate', action:()=>onToggle(p.id), cls:'' },
                            { icon:<IEdit s={14}/>, title:'Edit', action:()=>onEdit(p), cls:'' },
                            { icon:<ITrash s={14}/>, title:'Delete', action:()=>{ if(confirm(`Delete "${p.title}"?`)) onDelete(p.id); }, cls:'danger' },
                          ].map((btn,i) => (
                            <button key={i} title={btn.title} onClick={btn.action} className={`admin-action-btn ${btn.cls}`}>
                              {btn.icon}
                            </button>
                          ))}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════
     ADMIN DASHBOARD — STANDALONE VISUAL
  ═══════════════════════════════════════════════════ */
  const AdminDashboard = ({ products, onSave, onDelete, onToggle, onExit }) => {
    const [view, setView]   = useState('products');
    const [editing, setEdit] = useState(null);

    const handleEdit = p => { setEdit(p); setView('form'); };
    const handleAdd  = () => { setEdit(null); setView('form'); };
    const handleSave = p => { onSave(p); setView('products'); setEdit(null); };

    return (
      <div className="admin-layout">
        {/* Sidebar — dark separate visual system */}
        <aside className="admin-sidebar">
          <div className="admin-sidebar-head">
            <Logo dark={false} small />
            <span className="admin-panel-tag">Admin Panel</span>
          </div>
          <nav className="admin-nav">
            <button className={`admin-nav-item ${view==='products'?'active':''}`} onClick={() => setView('products')}>
              <IGrid s={14}/> Products
            </button>
            <button className={`admin-nav-item ${view==='form'&&!editing?'active':''}`} onClick={handleAdd}>
              <IPlus s={14}/> Add Product
            </button>
          </nav>
          <div className="admin-sidebar-foot">
            <button className="admin-exit-btn" onClick={onExit}>
              <IBack s={12}/> Exit to Store
            </button>
          </div>
        </aside>

        {/* Content */}
        <div className="admin-content">
          {view === 'products'
            ? <AdminList products={products} onEdit={handleEdit} onDelete={onDelete} onToggle={onToggle} onAdd={handleAdd} />
            : <AdminProductForm product={editing} onSave={handleSave} onCancel={() => setView('products')} />
          }
        </div>
      </div>
    );
  };

  /* ═══════════════════════════════════════════════════
     APP ROOT
  ═══════════════════════════════════════════════════ */
  const App = () => {
    const [products, setProducts] = useState(() => getProducts() || SEED);
    const [cart, setCart]         = useState(() => getCart());
    const [page, setPage]         = useState('store');
    const [selId, setSelId]       = useState(null);
    const [adminIn, setAdminIn]   = useState(false);
    const [toast, setToast]       = useState({ show:false, msg:'' });

    useEffect(() => { saveProducts(products); }, [products]);
    useEffect(() => { saveCart(cart); }, [cart]);

    const notify = useCallback(msg => {
      setToast({ show:true, msg });
      setTimeout(() => setToast({ show:false, msg:'' }), 2600);
    }, []);

    const saveProduct = useCallback(p => {
      setProducts(prev => {
        const i = prev.findIndex(x => x.id === p.id);
        if (i >= 0) { const a=[...prev]; a[i]=p; return a; }
        return [p,...prev];
      });
      notify(p.title + ' saved ✓');
    }, [notify]);

    const deleteProduct = useCallback(id => { setProducts(p => p.filter(x => x.id!==id)); notify('Product deleted'); }, [notify]);
    const toggleProduct = useCallback(id => setProducts(p => p.map(x => x.id===id ? {...x,active:!x.active} : x)), []);

    const addToCart = useCallback((product, size) => {
      setCart(prev => {
        const ex = prev.find(c => c.productId===product.id && c.size===size);
        if (ex) return prev.map(c => c.productId===product.id&&c.size===size ? {...c,qty:c.qty+1} : c);
        return [...prev, { productId:product.id, size, qty:1 }];
      });
      notify(`${product.title} (${size}) added`);
    }, [notify]);

    const removeFromCart = useCallback((productId, size) => setCart(p => p.filter(c => !(c.productId===productId && c.size===size))), []);
    const updateQty      = useCallback((productId, size, qty) => {
      if (qty <= 0) removeFromCart(productId, size);
      else setCart(p => p.map(c => c.productId===productId&&c.size===size ? {...c,qty} : c));
    }, [removeFromCart]);

    const onCheckoutSuccess = useCallback(() => { setCart([]); setPage('store'); notify("Order placed! We'll contact you soon."); }, [notify]);

    const cartCount  = cart.reduce((s,c) => s+c.qty, 0);
    const selProduct = products.find(p => p.id === selId);

    // Admin pages are full-screen takeover — no customer header
    const isAdminPage = page === 'admin';

    const goTo = pg => { setPage(pg); window.scrollTo({ top:0, behavior:'smooth' }); };

    return (
      <div>
        {/* Customer header — hidden during admin */}
        {!isAdminPage && (
          <Header
            cartCount={cartCount}
            onCart={()  => goTo('cart')}
            onHome={()  => goTo('store')}
            onAdmin={()  => goTo('admin')}
          />
        )}

        {page === 'store'   && <StorePage products={products} onSelect={id => { setSelId(id); goTo('product'); }} />}
        {page === 'product' && selProduct && <ProductDetail product={selProduct} onBack={() => goTo('store')} onAddToCart={addToCart} />}
        {page === 'cart'    && <CartPage cart={cart} products={products} onBack={() => goTo('store')} onRemove={removeFromCart} onQty={updateQty} onSuccess={onCheckoutSuccess} />}

        {/* Admin — completely separate full-screen system */}
        {page === 'admin' && !adminIn && <AdminLogin onLogin={() => setAdminIn(true)} onBack={() => goTo('store')} />}
        {page === 'admin' && adminIn  && (
          <AdminDashboard
            products={products}
            onSave={saveProduct}
            onDelete={deleteProduct}
            onToggle={toggleProduct}
            onExit={() => { setAdminIn(false); goTo('store'); }}
          />
        )}

        <Toast msg={toast.msg} show={toast.show} />
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
